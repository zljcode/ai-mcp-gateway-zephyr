<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
    <h1 class="page-title">网关认证与限流</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button type="button" class="btn btn-sm btn-outline-secondary me-2" id="refreshGatewayAuthList">
            <i class="bi bi-arrow-clockwise"></i> 刷新列表
        </button>
        <button type="button" class="btn btn-sm btn-primary d-flex align-items-center gap-1" data-bs-toggle="modal" data-bs-target="#gatewayAuthModal" id="addGatewayAuthBtn">
            <i class="bi bi-plus-lg"></i> 新增配置
        </button>
    </div>
</div>

<div class="card mb-4 shadow-sm border-0">
    <div class="card-body">
        <form id="form-gateway-auth-search" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label text-muted small mb-1">网关 ID</label>
                <input type="text" class="form-control form-control-sm" id="search-auth-gatewayId" placeholder="请输入网关 ID">
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary btn-sm me-2"><i class="bi bi-search"></i> 查询</button>
                <button type="button" class="btn btn-light btn-sm" id="btn-reset-auth-search"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
            </div>
        </form>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>网关ID</th>
                        <th>API Key</th>
                        <th>限流速率</th>
                        <th>过期时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="gatewayAuthTableBody">
                    <!-- 数据由JS动态生成 -->
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="card-footer bg-white py-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div class="text-muted small" id="auth-pagination-info">
                显示 0 到 0 条，共 0 条数据
            </div>
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0" id="auth-pagination-container">
                    <!-- 分页按钮由 JS 动态生成 -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 网关认证配置模态框 -->
<div class="modal fade" id="gatewayAuthModal" tabindex="-1" aria-labelledby="gatewayAuthModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="gatewayAuthModalLabel"><i class="bi bi-shield-check me-2"></i>新增认证配置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form-gateway-auth">
                    <div class="mb-3">
                        <label class="form-label">网关 ID <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="auth-gatewayId" name="gatewayId" required placeholder="目标网关ID">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">限流速率 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="auth-rateLimit" name="rateLimit" required value="100">
                            <span class="input-group-text bg-light">次/秒</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Token 过期时间 <span class="text-danger">*</span></label>
                        <input type="datetime-local" class="form-control" id="auth-expireTime" name="expireTime" required>
                    </div>
                    <div class="modal-footer px-0 pb-0 border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-1">
                            <i class="bi bi-check2-circle"></i> 保存配置
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
