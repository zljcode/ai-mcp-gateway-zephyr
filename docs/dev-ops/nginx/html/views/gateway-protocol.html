<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
    <h1 class="page-title">网关协议配置</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button type="button" class="btn btn-sm btn-outline-secondary me-2" id="refreshGatewayProtocolList">
            <i class="bi bi-arrow-clockwise"></i> 刷新列表
        </button>
        <button type="button" class="btn btn-sm btn-outline-success d-flex align-items-center gap-1" data-bs-toggle="modal" data-bs-target="#importProtocolModal" id="importProtocolBtn">
            <i class="bi bi-upload"></i> 导入协议
        </button>
    </div>
</div>

<div class="card mb-4 shadow-sm border-0">
    <div class="card-body">
        <form id="form-gateway-protocol-search" class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label text-muted small mb-1">协议 ID</label>
                <input type="number" class="form-control form-control-sm" id="search-protocol-protocolId" placeholder="请输入协议 ID">
            </div>
            <div class="col-md-4">
                <label class="form-label text-muted small mb-1">请求地址 (URL)</label>
                <input type="text" class="form-control form-control-sm" id="search-protocol-httpUrl" placeholder="请输入请求地址模糊匹配">
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary btn-sm me-2"><i class="bi bi-search"></i> 查询</button>
                <button type="button" class="btn btn-light btn-sm" id="btn-reset-protocol-search"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
            </div>
        </form>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>协议ID</th>
                        <th>请求地址(URL)</th>
                        <th>请求方法</th>
                        <th>超时时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="gatewayProtocolTableBody">
                    <!-- 数据由JS动态生成 -->
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="card-footer bg-white py-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div class="text-muted small" id="protocol-pagination-info">
                显示 0 到 0 条，共 0 条数据
            </div>
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0" id="protocol-pagination-container">
                    <!-- 分页按钮由 JS 动态生成 -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 网关协议配置模态框 -->
<div class="modal fade" id="gatewayProtocolModal" tabindex="-1" aria-labelledby="gatewayProtocolModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="gatewayProtocolModalLabel"><i class="bi bi-pencil-square me-2"></i>修改网关协议配置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form-gateway-protocol">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">协议 ID</label>
                            <input type="number" class="form-control" id="protocol-protocolId" name="protocolId" readonly>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">请求地址 (URL) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-link-45deg"></i></span>
                                <input type="url" class="form-control" id="protocol-httpUrl" name="httpUrl" required placeholder="http://api.example.com/v1/resource">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">请求方法</label>
                            <select class="form-select" id="protocol-httpMethod" name="httpMethod">
                                <option value="get">get</option>
                                <option value="post">post</option>
                                <option value="put">put</option>
                                <option value="delete">delete</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">超时时间 (ms)</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="protocol-timeout" name="timeout" value="5000">
                                <span class="input-group-text bg-light">ms</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">请求头 (Headers JSON)</label>
                            <input type="text" class="form-control" id="protocol-httpHeaders" name="httpHeaders" placeholder='{"Content-Type":"application/json"}'>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">读取协议配置 (OpenAPI JSON)</label>
                            <div class="input-group">
                                <input class="form-control" type="file" id="protocol-import-json-file" accept=".json">
                                <button class="btn btn-outline-secondary" type="button" id="btn-parse-protocol-json"><i class="bi bi-file-earmark-code"></i> 解析并导入</button>
                            </div>
                            <div class="form-text text-muted">
                                解析目标地址为：<code id="protocol-target-endpoint">-</code>（通过上面的 URL 自动提取）
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">参数映射 (Mappings JSON)</label>
                        <textarea class="form-control font-monospace" id="protocol-mappingsJson" name="mappingsJson" rows="4" placeholder='[
  {
    "mappingType": "query", 
    "fieldName": "id", 
    "mcpPath": "$.id", 
    "mcpType": "string"
  }
]'></textarea>
                        <div class="form-text">请填入合法的 JSON 数组格式。</div>
                    </div>
                    
                    <div class="modal-footer px-0 pb-0 border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-1">
                            <i class="bi bi-check2-circle"></i> 保存配置
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 导入协议配置模态框 -->
<div class="modal fade" id="importProtocolModal" tabindex="-1" aria-labelledby="importProtocolModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="importProtocolModalLabel"><i class="bi bi-upload me-2"></i>导入协议配置 (OpenAPI JSON)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form-import-protocol">
                    <div class="mb-3">
                        <label class="form-label">上传 JSON 文件 <span class="text-danger">*</span></label>
                        <input class="form-control" type="file" id="import-json-file" accept=".json" required>
                    </div>
                    <div class="mb-3 d-none" id="endpoints-selection-container">
                        <label class="form-label">选择要导入的接口 <span class="text-danger">*</span></label>
                        <div class="card">
                            <div class="card-body" style="max-height: 300px; overflow-y: auto;" id="endpoints-list">
                                <!-- 接口列表由 JS 动态生成 -->
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer px-0 pb-0 border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-1" id="btn-submit-import" disabled>
                            <i class="bi bi-check2-circle"></i> 确认导入
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
