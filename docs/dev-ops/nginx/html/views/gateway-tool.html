<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
    <h1 class="page-title">网关工具列表</h1>
    <div>
        <button class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-1 me-2" id="refreshGatewayToolList">
            <i class="bi bi-arrow-clockwise"></i> 刷新数据
        </button>
        <button class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1" data-bs-toggle="modal" data-bs-target="#gatewayToolModal" id="addGatewayToolBtn">
            <i class="bi bi-plus-lg"></i> 网关配置
        </button>
    </div>
</div>

<div class="card mb-4">
    <div class="card-body">
        <form id="form-gateway-tool-search" class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label text-muted small mb-1">网关 ID</label>
                <input type="text" class="form-control form-control-sm" id="search-tool-gatewayId" placeholder="请输入网关 ID">
            </div>
            <div class="col-md-3">
                <label class="form-label text-muted small mb-1">工具 ID</label>
                <input type="text" class="form-control form-control-sm" id="search-tool-toolId" placeholder="请输入工具 ID">
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary btn-sm me-2"><i class="bi bi-search"></i> 查询</button>
                <button type="button" class="btn btn-light btn-sm" id="btn-reset-tool-search"><i class="bi bi-arrow-counterclockwise"></i> 重置</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>网关ID</th>
                        <th>工具ID</th>
                        <th>工具名称</th>
                        <th>类型</th>
                        <th>描述</th>
                        <th>版本</th>
                        <th>协议</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="gatewayToolTableBody">
                    <tr>
                        <td colspan="8" class="text-center text-muted py-4">
                            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="card-footer bg-white py-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div class="text-muted small" id="tool-pagination-info">
                显示 0 到 0 条，共 0 条数据
            </div>
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0" id="tool-pagination-container">
                    <!-- 分页按钮由 JS 动态生成 -->
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 网关工具配置 Modal -->
<div class="modal fade" id="gatewayToolModal" tabindex="-1" aria-labelledby="gatewayToolModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="gatewayToolModalLabel"><i class="bi bi-tools me-2"></i>网关工具配置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form-gateway-tool">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">选择网关 <span class="text-danger">*</span></label>
                            <select class="form-select" name="gatewayId" id="tool-gatewayId" required>
                                <option value="">请选择网关...</option>
                            </select>
                            <div class="form-text text-muted" id="tool-gatewayId-help">网关ID: -</div>
                        </div>
                        <div class="col-md-6 mt-3 mt-md-0">
                            <label class="form-label">工具 ID <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="toolId" id="tool-toolId" required placeholder="唯一的工具标识（自动生成）" readonly>
                            <div class="form-text text-muted">新增时系统自动生成8位数字。</div>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">工具名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="toolName" id="tool-toolName" required placeholder="显示名称">
                        </div>
                        <div class="col-md-6 mt-3 mt-md-0">
                            <label class="form-label">工具类型 <span class="text-danger">*</span></label>
                            <select class="form-select" name="toolType" id="tool-toolType" required>
                                <option value="function">function</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">工具描述</label>
                        <textarea class="form-control" name="toolDescription" id="tool-toolDescription" rows="2" placeholder="描述该工具的功能和用途..."></textarea>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">工具版本</label>
                            <input type="text" class="form-control" name="toolVersion" id="tool-toolVersion" value="1.0.0">
                        </div>
                        <div class="col-md-4 mt-3 mt-md-0">
                            <label class="form-label">关联协议 URL <span class="text-danger">*</span></label>
                            <select class="form-select" name="protocolId" id="tool-protocolId" required>
                                <option value="">请选择关联协议...</option>
                            </select>
                            <div class="form-text text-muted" id="tool-protocolId-help">协议ID: -</div>
                        </div>
                        <div class="col-md-4 mt-3 mt-md-0">
                            <label class="form-label">协议类型</label>
                            <select class="form-select" name="protocolType" id="tool-protocolType">
                                <option value="http">http</option>
                                <option value="dubbo">dubbo</option>
                                <option value="rabbitmq">rabbitmq</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-4">
                        <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary d-flex align-items-center gap-1">
                            <i class="bi bi-check2-circle"></i> 保存配置
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
