<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 网关管理系统</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar navbar-expand-md sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" href="#">
            MCP Gateway
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="navbar-nav ms-auto d-flex align-items-center">
            <div class="nav-item text-nowrap d-flex align-items-center gap-3 pe-3">
                <span class="text-secondary small"><i class="bi bi-person-circle me-1"></i>Admin</span>
                <a class="nav-link d-flex align-items-center gap-1" href="#" id="logoutBtn">
                    <i class="bi bi-box-arrow-right"></i> 退出
                </a>
            </div>
        </div>
    </div>
</header>

<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="sidebar-sticky">
                <ul class="nav flex-column mb-4">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-target="dashboard">
                            <i class="bi bi-speedometer2"></i> 控制台
                        </a>
                    </li>
                </ul>
                
                <h6 class="sidebar-heading px-3 mb-2">
                    <span>网关管理</span>
                </h6>
                <ul class="nav flex-column mb-4">
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-target="gateway-list">
                            <i class="bi bi-list-ul"></i> 网关列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-target="gateway-test">
                            <i class="bi bi-send-check"></i> 网关调用测试
                        </a>
                    </li>
                    <!-- 二级目录: 元素配置 -->
                    <li class="nav-item">
                        <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#elementConfigCollapse" role="button" aria-expanded="true" aria-controls="elementConfigCollapse">
                            <div><i class="bi bi-grid"></i> 元素配置</div>
                            <i class="bi bi-chevron-down"></i>
                        </a>
                        <div class="collapse show" id="elementConfigCollapse">
                            <ul class="nav flex-column ms-3">
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-target="gateway-tool">
                                        <i class="bi bi-tools"></i> 网关工具
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-target="gateway-protocol">
                                        <i class="bi bi-diagram-3"></i> 协议配置
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-target="gateway-auth">
                                        <i class="bi bi-shield-lock"></i> 认证配置
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="col-md-9 ms-sm-auto col-lg-10 main-content" id="main-content-wrapper">
            <!-- 动态内容加载区 -->
        </main>
    </div>
</div>

<!-- Toast 通知容器 -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center gap-2" id="toastMessage">
        <i class="bi bi-check-circle-fill"></i> <span>操作成功！</span>
      </div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
