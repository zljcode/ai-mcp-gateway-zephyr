<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }

        .login-wrapper {
            width: 100%;
            max-width: 380px;
            padding: 2rem;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .login-brand p {
            font-size: 0.88rem;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
        }

        .login-card .form-floating {
            margin-bottom: 1rem;
        }

        .login-card .form-control {
            height: 52px;
            font-size: 0.92rem;
        }

        .login-card .form-floating label {
            padding: 0.85rem 0.85rem;
            font-size: 0.88rem;
            color: var(--text-tertiary);
        }

        .btn-login {
            width: 100%;
            padding: 0.7rem;
            font-weight: 600;
            font-size: 0.95rem;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            letter-spacing: -0.01em;
            transition: background 0.15s;
        }

        .btn-login:hover {
            background: #000;
            color: #fff;
        }

        .login-hint {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        .login-error {
            font-size: 0.85rem;
            padding: 0.6rem 0.9rem;
            border-radius: var(--radius-sm);
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.78rem;
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-brand">
        <h1>MCP Gateway</h1>
        <p>AI 网关控制中心</p>
    </div>

    <div class="login-card">
        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" placeholder="用户名" required>
                <label for="username">用户名</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" placeholder="密码" required>
                <label for="password">密码</label>
            </div>

            <div id="loginError" class="alert alert-danger d-none login-error" role="alert">
                用户名或密码错误
            </div>

            <button type="submit" class="btn btn-login">
                登录
            </button>
        </form>
    </div>

    <div class="login-hint">
        测试账号 admin / password123
    </div>

    <div class="login-footer">
        &copy; 2025 AI MCP Gateway
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/config.js"></script>
<script>
    $(document).ready(function() {
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();

            const username = $('#username').val();
            const password = $('#password').val();
            const $btn = $(this).find('button[type="submit"]');

            const originalText = $btn.text();
            $btn.text('登录中...').prop('disabled', true);

            setTimeout(() => {
                if(username === MOCK_ACCOUNT.username && password === MOCK_ACCOUNT.password) {
                    localStorage.setItem('mcp_admin_logged_in', 'true');
                    window.location.href = 'admin.html';
                } else {
                    $('#loginError').removeClass('d-none');
                    $btn.text(originalText).prop('disabled', false);

                    $('.login-card').css('animation', 'none');
                    setTimeout(() => {
                        $('.login-card').css('animation', '');
                    }, 10);
                }
            }, 500);
        });

        $('#username').val(MOCK_ACCOUNT.username);
        $('#password').val(MOCK_ACCOUNT.password);

        $('#username, #password').on('input', function() {
            $('#loginError').addClass('d-none');
        });
    });
</script>
</body>
</html>
