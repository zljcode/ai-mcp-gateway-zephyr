<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 网关管理系统 - 登录</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background: #fff;
        }
        .login-header {
            background: linear-gradient(to right, #4e54c8, #8f94fb);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .login-body {
            padding: 2.5rem;
        }
        .form-floating:focus-within label {
            color: #4e54c8;
        }
        .btn-login {
            background: linear-gradient(to right, #4e54c8, #8f94fb);
            border: none;
            border-radius: 50px;
            padding: 0.75rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 84, 200, 0.4);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="login-card">
                <div class="login-header">
                    <i class="bi bi-hdd-network display-4 mb-3 d-block"></i>
                    <h3 class="fw-bold mb-1">MCP 网关管理系统</h3>
                    <p class="mb-0 opacity-75">高效、智能的 AI 网关控制中心</p>
                </div>
                <div class="login-body">
                    <div class="text-center mb-4">
                        <h5 class="text-muted fw-normal">账号登录</h5>
                    </div>

                    <form id="loginForm">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                            <label for="username"><i class="bi bi-person me-2"></i>用户名</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                            <label for="password"><i class="bi bi-shield-lock me-2"></i>密码</label>
                        </div>
                        
                        <!-- 错误提示信息 -->
                        <div id="loginError" class="alert alert-danger d-none py-2 small d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span>用户名或密码错误！</span>
                        </div>

                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-primary btn-login">
                                立即登录 <i class="bi bi-arrow-right-circle ms-1"></i>
                            </button>
                        </div>
                        
                        <div class="text-center small text-muted bg-light p-2 rounded">
                            <i class="bi bi-info-circle me-1"></i> 测试账号：<strong>admin</strong> / <strong>password123</strong>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-4 text-muted small">
                &copy; 2024-2025 AI MCP Gateway. All rights reserved.
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/config.js"></script>
<script>
    $(document).ready(function() {
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            
            const username = $('#username').val();
            const password = $('#password').val();
            const $btn = $(this).find('button[type="submit"]');
            
            // 按钮加载状态
            const originalText = $btn.html();
            $btn.html('<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>登录中...').prop('disabled', true);
            
            // 模拟登录延迟，增加真实感
            setTimeout(() => {
                if(username === MOCK_ACCOUNT.username && password === MOCK_ACCOUNT.password) {
                    // 登录成功，记录状态并跳转
                    localStorage.setItem('mcp_admin_logged_in', 'true');
                    window.location.href = 'admin.html';
                } else {
                    // 登录失败，显示错误并恢复按钮状态
                    $('#loginError').removeClass('d-none');
                    $btn.html(originalText).prop('disabled', false);
                    
                    // 添加震动动画
                    $('.login-card').addClass('animate__animated animate__headShake');
                    setTimeout(() => {
                        $('.login-card').removeClass('animate__animated animate__headShake');
                    }, 1000);
                }
            }, 600);
        });
        
        // 自动填入测试账号
        $('#username').val(MOCK_ACCOUNT.username);
        $('#password').val(MOCK_ACCOUNT.password);
        
        // 输入时隐藏错误提示
        $('#username, #password').on('input', function() {
            $('#loginError').addClass('d-none');
        });
    });
</script>
<!-- 引入 Animate.css 以支持错误震动效果 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</body>
</html>
